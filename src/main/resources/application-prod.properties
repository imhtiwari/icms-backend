# Production Configuration
server.port=8083

# Build Configuration
spring.profiles.active=prod
spring.output.dir=target

# Static Resource Configuration
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.mvc.static-path-pattern=/resources/static/**

# Logging Configuration
logging.level.root=WARN
logging.level.com.medicaps.icms=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/icms-prod.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Performance Configuration
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/json
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10

# Security Configuration
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.timeout=1800

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/icms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=$Sign1time
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Production AI Settings
ai.validation.enabled=true
ai.validation.fail-open=true
gemini.validation-model=gemini-2.5-flash

# Production Image Review
complaint.image-review.enabled=true
complaint.image-review.fail-open=false
gemini.api-key=AIzaSyDnFMDQbHwhrFJC8rJuC9lohn-2ojMUs8Q
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.image-review-model=gemini-2.5-flash
